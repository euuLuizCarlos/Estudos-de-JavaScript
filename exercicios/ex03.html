<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Gorjeta</title>
    <style>
        body{
            font: normal 20px Arial;
        
        }
        input{
            font: normal 20px Arial;
            width: 200px;
        }
        div#resultado{
            margin-top: 20px;
            font-size: 25px;
            color: green;
        }
    </style>
</head>

<body>

    <h1>Calculadora de Gorjeta</h1>

    <input type="number" name="valor da conta" id="valor" placeholder="Valor da Conta">
    <input type="button" value="Calcular" onclick="calcularGorjeta()">
    <div id="resultado"></div>

    <script>
        function calcularGorjeta(){
            var valorConta = window.document.getElementById('valor');
            var resultado = window.document.getElementById('resultado');
            var valor = Number(valorConta.value);
            var gorjeta = valor * 0.1;
            resultado.innerHTML = `Valor da conta: R$ ${valor.toFixed(2)} <br> Gorjeta (10%): R$ ${gorjeta.toFixed(2)} <br> Total a pagar da conta: R$ ${(valor + gorjeta).toFixed(2)}`;
        }
    </script>
    
</body>
</html>
